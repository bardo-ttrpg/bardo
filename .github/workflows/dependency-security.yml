name: Dependency Security

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read

jobs:
  scan-full:
    if: github.event_name != 'pull_request'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.1
    with:
      fail-on-vuln: true
      upload-sarif: false
      scan-args: |
        --recursive
        ./
