name: Release Gates

on:
  pull_request:
    paths:
      - "mcp/**"
      - "website/**"
      - ".github/workflows/release-gates.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - "mcp/**"
      - "website/**"
      - ".github/workflows/release-gates.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"

jobs:
  mcp-ga:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun ci

      - name: Run MCP GA readiness
        working-directory: mcp
        run: bun run ga:readiness

  website-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun ci

      - name: Install Playwright browser and system deps
        working-directory: website
        run: bunx playwright install --with-deps chromium

      - name: Run website E2E tests
        working-directory: website
        run: bun run test:e2e

  release-gates:
    runs-on: ubuntu-latest
    needs: [mcp-ga, website-e2e]
    if: ${{ always() }}
    steps:
      - name: Validate release gate dependencies
        run: |
          if [ "${{ needs.mcp-ga.result }}" != "success" ] || [ "${{ needs.website-e2e.result }}" != "success" ]; then
            echo "Release gates failed."
            exit 1
          fi
          echo "Release gates passed."
