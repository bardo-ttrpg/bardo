name: CI

on:
  pull_request:
    paths:
      - ".github/dependabot.yml"
      - "mcp/**"
      - "packages/**"
      - "website/**"
      - ".github/workflows/release-gates.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - ".github/dependabot.yml"
      - "mcp/**"
      - "packages/**"
      - "website/**"
      - ".github/workflows/release-gates.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      BARDO_MCP_BASE_URL: https://example.com
      NEXT_PUBLIC_APP_URL: https://example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun ci

      - name: Validate monorepo checks
        run: bun run check

      - name: Run monorepo tests
        run: bun run test

      - name: Run release gate tests
        run: bun run test:release-gates

      - name: Verify website production build
        run: bun run --cwd website build
