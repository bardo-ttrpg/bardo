name: Website E2E

on:
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website-e2e.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/website-e2e.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun ci

      - name: Install Playwright browser and system deps
        working-directory: website
        run: bunx playwright install --with-deps chromium

      - name: Run website e2e tests
        working-directory: website
        run: bun run test:e2e
