name: MCP GA Gates

on:
  pull_request:
    paths:
      - "mcp/**"
      - ".github/workflows/mcp-ga-gates.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
  push:
    branches:
      - main
    paths:
      - "mcp/**"
      - ".github/workflows/mcp-ga-gates.yml"
      - "package.json"
      - "bun.lock"
      - "turbo.json"

jobs:
  ga-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun ci

      - name: Run MCP GA readiness
        run: |
          cd mcp
          bun run ga:readiness
