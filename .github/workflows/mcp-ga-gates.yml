name: MCP GA Gates

on:
  workflow_dispatch:

jobs:
  ga-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun ci

      - name: Run MCP GA readiness
        run: |
          cd mcp
          bun run ga:readiness
