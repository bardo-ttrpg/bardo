version: "2"
type: backend
tech_stack:
  - TypeScript
  - Bun
  - MCP SDK (@modelcontextprotocol/sdk)
  - Zod
features:
  - name: Health Check
    description: Returns server health status including auth configuration
    files:
      - index.ts
    endpoints:
      - method: GET
        path: /health
        description: Returns server health status, auth requirement, and configured API key count
        auth_required: false
        response_schema:
          "200": '{ status: "ok", authRequired: boolean, configuredApiKeys: number }'
  - name: MCP Session Management
    description: Create, use, and close MCP sessions for communication with AI agents
    files:
      - index.ts
      - src/auth.ts
      - src/types.ts
      - src/http/response.ts
    endpoints:
      - method: POST
        path: /mcp
        description: Create a new MCP session or send a request to an existing session
        auth_required: true
        request_schema:
          headers:
            x-api-key: string (optional)
            Authorization: Bearer <key> (optional)
            mcp-session-id: string (optional, for existing sessions)
          query:
            apiKey: string (optional)
          body: JSON-RPC request
        response_schema:
          "200": JSON-RPC response with mcp-session-id header
          "401": Unauthorized
          "404": Session not found
      - method: GET
        path: /mcp
        description: Retrieve data from an existing MCP session (SSE stream)
        auth_required: true
        request_schema:
          headers:
            mcp-session-id: string (required)
        response_schema:
          "200": MCP session response
          "400": Missing mcp-session-id header
          "404": Session not found
      - method: DELETE
        path: /mcp
        description: Close an existing MCP session
        auth_required: true
        request_schema:
          headers:
            mcp-session-id: string (required)
        response_schema:
          "200": Session closed
          "400": Missing mcp-session-id header
          "404": Session not found
      - method: OPTIONS
        path: /mcp
        description: CORS preflight for MCP endpoint
        auth_required: false
        response_schema:
          "204": CORS headers
    depends_on:
      - Authentication
  - name: Authentication
    description: API key based authentication with multi-tenant campaign isolation
    files:
      - src/auth.ts
      - src/config.ts
    endpoints: []
  - name: MCP Tool - init
    description: Initialize bardo workspace directory structure under authorized campaign root
    files:
      - src/tools/init.ts
      - src/lib/filesystem.ts
    endpoints:
      - method: POST
        path: /mcp
        description: MCP tool call - init - creates bardo directory tree (rules, party, entities, items, world, quests, state)
        auth_required: true
        request_schema:
          body: 'JSON-RPC call with method "tools/call", tool name "init", no arguments'
        response_schema:
          "200": Status report of directories created/verified
  - name: MCP Tool - markdown_read
    description: Read a markdown file under bardo workspace, parsing frontmatter and body
    files:
      - src/tools/markdown-read.ts
      - src/lib/markdown.ts
      - src/lib/filesystem.ts
    endpoints:
      - method: POST
        path: /mcp
        description: MCP tool call - markdown_read - reads and parses markdown files
        auth_required: true
        request_schema:
          body: 'JSON-RPC call with tool name "markdown_read", args: { path: string }'
        response_schema:
          "200": Parsed frontmatter and body content
  - name: MCP Tool - markdown_upsert
    description: Create or update a markdown file with frontmatter and content merge strategies
    files:
      - src/tools/markdown-upsert.ts
      - src/lib/markdown.ts
      - src/lib/filesystem.ts
    endpoints:
      - method: POST
        path: /mcp
        description: MCP tool call - markdown_upsert - creates or updates markdown files
        auth_required: true
        request_schema:
          body: 'JSON-RPC call with tool name "markdown_upsert", args: { path: string, title?: string, description?: string, content?: string, mergeStrategy?: "replace"|"append"|"prepend" }'
        response_schema:
          "200": Final frontmatter and content written
  - name: MCP Tool - player_action
    description: Primary gameplay tool that processes natural language player actions, advances world time, creates locations/NPCs, and updates state
    files:
      - src/tools/player-action.ts
      - src/lib/filesystem.ts
      - src/lib/markdown.ts
    endpoints:
      - method: POST
        path: /mcp
        description: MCP tool call - player_action - processes player actions with auto time advancement and entity creation
        auth_required: true
        request_schema:
          body: 'JSON-RPC call with tool name "player_action", args: { action: string (1-1000 chars) }'
        response_schema:
          "200": Gameplay event including time advancement, location changes, created entities
  - name: MCP Tool - state_get
    description: Read campaign state from a markdown file and parse JSON body
    files:
      - src/tools/state-get.ts
      - src/lib/markdown.ts
      - src/lib/filesystem.ts
    endpoints:
      - method: POST
        path: /mcp
        description: MCP tool call - state_get - reads and parses state JSON from markdown
        auth_required: true
        request_schema:
          body: 'JSON-RPC call with tool name "state_get", args: { path?: string }'
        response_schema:
          "200": Parsed frontmatter and state object
  - name: MCP Tool - state_set
    description: Write campaign state as JSON in a markdown file with frontmatter metadata
    files:
      - src/tools/state-set.ts
      - src/lib/markdown.ts
      - src/lib/filesystem.ts
    endpoints:
      - method: POST
        path: /mcp
        description: MCP tool call - state_set - writes state JSON to markdown file
        auth_required: true
        request_schema:
          body: 'JSON-RPC call with tool name "state_set", args: { path?: string, state: object, title?: string, description?: string }'
        response_schema:
          "200": Confirmation of write with final state
known_limitations:
  - issue: Sessions stored in-memory only, lost on server restart
    location: index.ts
    impact: All active MCP sessions are lost when server restarts
  - issue: No rate limiting on API endpoints
    location: index.ts
    impact: Server could be overwhelmed by excessive requests
  - issue: File-based storage has no concurrency control
    location: src/lib/filesystem.ts
    impact: Concurrent writes to same file could cause data loss
